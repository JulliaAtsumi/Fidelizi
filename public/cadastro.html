<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fidelizi — Início</title>
  <link rel="icon" href="/src/assets/img/favicon.png" type="image/png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <link rel="stylesheet" href="/src/assets/styles/style.css" />
  <link rel="stylesheet" href="/src/assets/styles/login_cadas.css">
</head>
<body>

  <!-- HEADER / NAV (CSS-only menu usando checkbox) -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="/src/assets/img/logo_horizontal.png" alt="Logo" class="brand-logo">
      </a>

      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
      </label>

      <nav class="site-nav">
        <a href="index.html">Início</a>
        <a href="dispositivos.html">Dispositivos</a>
        <a href="testes.html">Criar Teste</a>
        <a href="quem_somos.html">Quem Somos</a>
        <a href="#contato">Contato</a>
        <a href="login.html" class="btn-outline">Entrar</a>
      </nav>
    </div>
  </header>

  <main class="tela-cadastro">
    <div class="caixa-cadastro">
      <h2>Cadastro</h2>

      <!-- Toggle deslizante -->
      <div class="alternar-tipo">
        <input type="radio" name="tipo" id="pf" checked>
        <label for="pf">Pessoa Física</label>
        <input type="radio" name="tipo" id="pj">
        <label for="pj">Pessoa Jurídica</label>
        <div class="deslizante"></div>
      </div>

      <form>
        <!-- Campos PF -->
        <div class="formulario pf">
          <input type="text" placeholder="Nome completo" required>
          <input type="text" placeholder="CPF" required>
          <input type="email" placeholder="E-mail" required>
          <input type="password" placeholder="Senha" required>
        </div>

        <!-- Campos PJ -->
        <div class="formulario pj">
          <input type="text" placeholder="Razão social" required>
          <input type="text" placeholder="CNPJ" required>
          <input type="email" placeholder="E-mail empresarial" required>
          <input type="password" placeholder="Senha" required>
        </div>

        <button type="submit" class="botao-principal">Cadastrar</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p>© Fidelizi • Segurança em Dispositivos IoT.</p>
      </div>
      <div class="footer-right">
        <nav class="footer-nav">
          <a href="index.html">Início</a>
          <a href="dispositivos.html">Dispositivo</a>
          <a href="testes.html">Testes</a>
          <a href="quem_somos.html">Quem Somos</a>
        </nav>
      </div>
    </div>
    <div class="container   footer-team">
      <div class="footer-team">
        <p>Desenvolvido por<a href="team_dev.html">Jullia Akutagawa</a>  e<a href="team_dev.html">Mª Eduarda Leão</a></p>
      </div>
    </div>
  </footer>

</body>
</html>
