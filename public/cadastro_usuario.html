<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fidelizi - Criar Conta</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link rel="icon" href="/src/assets/img/favicon.png" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="/src/assets/styles/style.css" />
    
    <style>
        .hidden {
            display: none !important;
        }

        .cadastro-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .cadastro-card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(28,44,70,0.15);
            width: 100%;
            max-width: 600px;
        }

        .cadastro-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .cadastro-logo {
            max-width: 200px;
            margin-bottom: 1rem;
        }

        .cadastro-title {
            color: #1e3a8a;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .cadastro-subtitle {
            color: #6b7280;
            font-size: 1rem;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .type-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .type-option {
            flex: 1;
            padding: 1.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .type-option:hover {
            border-color: #3b82f6;
        }

        .type-option.active {
            border-color: #1e3a8a;
            background: #f8fafc;
        }

        .type-option i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #6b7280;
        }

        .type-option.active i {
            color: #1e3a8a;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .btn-cadastrar {
            background-color: #1e3a8a;
            border-color: #1e3a8a;
            color: white;
            flex: 1;
        }

        .btn-cadastrar:hover {
            background-color: #1e40af;
            border-color: #1e40af;
        }

        .btn-login {
            background-color: #f8fafc;
            border-color: #e5e7eb;
            color: #374151;
            flex: 1;
        }

        .btn-login:hover {
            background-color: #f1f5f9;
            border-color: #d1d5db;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background-color: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        .alert-error {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .alert-info {
            background-color: #dbeafe;
            border: 1px solid #93c5fd;
            color: #1e40af;
        }
    </style>
</head>

<body>
    <div class="cadastro-container">
        <div class="cadastro-card">
            <!-- Header -->
            <div class="cadastro-header">
                <img src="/src/assets/img/logo_horizontal.png" alt="Fidelizi" class="cadastro-logo">
                <h1 class="cadastro-title">Criar Nova Conta</h1>
                <p class="cadastro-subtitle">Preencha os dados abaixo para se cadastrar</p>
            </div>

            <!-- Alert Messages -->
            <div id="alert-message" class="alert hidden"></div>

            <!-- Form Section -->
            <div class="form-section">
                <form id="user-form">
                    <input type="hidden" id="user-id" value="">
                    <input type="hidden" id="user-perfil" value="usuario">

                    <!-- Tipo de Usuário -->
                    <div class="form-group mb-4">
                        <label class="form-label mb-3">Tipo de Conta *</label>
                        <div class="type-selector">
                            <div class="type-option active" onclick="selectType('pf')">
                                <i class="fas fa-user"></i>
                                <div>Pessoa Física</div>
                            </div>
                            <div class="type-option" onclick="selectType('pj')">
                                <i class="fas fa-building"></i>
                                <div>Pessoa Jurídica</div>
                            </div>
                        </div>
                        <select class="form-select hidden" id="user-type" required onchange="toggleFields()">
                            <option value="pf" selected>Pessoa Física</option>
                            <option value="pj">Pessoa Jurídica</option>
                        </select>
                    </div>

                    <!-- Email e Senha -->
                    <div class="row mb-3">
                        <div class="col-12">
                            <div class="form-group">
                                <label for="user-email" class="form-label">E-mail *</label>
                                <input type="email" class="form-control" id="user-email"
                                    placeholder="seu@email.com" required>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="form-group">
                                <label for="user-password" class="form-label">Senha *</label>
                                <input type="password" class="form-control" id="user-password"
                                    placeholder="Mínimo 6 caracteres" minlength="6" required>
                            </div>
                        </div>
                    </div>

                    <!-- Campos Pessoa Física -->
                    <div id="pf-fields">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="form-group">
                                    <label for="user-name" class="form-label">Nome Completo *</label>
                                    <input type="text" class="form-control" id="user-name"
                                        placeholder="João Silva Santos" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="user-cpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control" id="user-cpf"
                                        placeholder="000.000.000-00" maxlength="14">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Campos Pessoa Jurídica -->
                    <div id="pj-fields" class="hidden">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="form-group">
                                    <label for="company-name" class="form-label">Razão Social *</label>
                                    <input type="text" class="form-control" id="company-name"
                                        placeholder="Empresa Ltda" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="company-cnpj" class="form-label">CNPJ</label>
                                    <input type="text" class="form-control" id="company-cnpj"
                                        placeholder="00.000.000/0000-00" maxlength="18">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="company-contact" class="form-label">Nome do Contato</label>
                                    <input type="text" class="form-control" id="company-contact"
                                        placeholder="Nome da pessoa responsável">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="company-phone" class="form-label">Telefone</label>
                                    <input type="text" class="form-control" id="company-phone"
                                        placeholder="(11) 99999-9999" maxlength="15">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Ações -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-login" onclick="goToLogin()">
                            <i class="fas fa-sign-in-alt me-2"></i>Fazer Login
                        </button>
                        <button type="submit" class="btn btn-cadastrar">
                            <i class="fas fa-user-plus me-2"></i>Criar Conta
                        </button>
                    </div>
                </form>
            </div>

            <!-- Footer -->
            <div class="text-center mt-4">
                <p class="text-muted">
                    Ao criar uma conta, você concorda com nossos 
                    <a href="#" style="color: #1e3a8a;">Termos de Uso</a> e 
                    <a href="#" style="color: #1e3a8a;">Política de Privacidade</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Configuração do Firebase -->
    <script src="js/firebase/firebase-config.js"></script>
    
    <!-- Script do Cadastro -->
    <script src="js/cadastro_usuario.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
