<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidelizi</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- jsPDF para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="icon" href="/src/assets/img/favicon.png" type="image/png">
    <link rel="stylesheet" href="/src/assets/styles/index.css">
    <link rel="stylesheet" href="/src/assets/styles/style.css">
</head>

<body>
    <section class="bg-index">
        <div class="bg-image"></div>
    </section>

    <div class="container">
        <div class="logo-section">
            <div>
                <img src="/src/assets/img/logo_horizontal.png" alt="Logo Fidelizi">
            </div>
        </div>

        <div class="content-section">
            <div id="alert-message" class="alert"></div>

            <div class="form-container">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com">
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button class="btn btn-primary" onclick="login()">Entrar</button>

                <div class="divider">
                    <span>ou</span>
                </div>

                <button class="btn btn-secondary" onclick="cadastrar()">Criar uma conta</button>
            </div>

            <div class="footer">
                <p><a href="recup_senha.html">Esqueceu sua senha?</a></p>
            </div>

            <!-- Informações de acesso admin -->
            <div class="admin-info">
                <h4>Acesso de Teste</h4>
                <p><strong>Admin:</strong> admin@fidelizi.com / 123456</p>
                <p><strong>Usuário:</strong> usuario@fidelizi.com / 123456</p>
            </div>
        </div>
    </div>

    <!-- Firebase Configuration v2 -->
    <script src="js/firebase/firebase-config-v2.js"></script>
    
    <!-- Core Services -->
    <script src="js/services/StateManager.js"></script>
    <script src="js/services/AuthService.js"></script>
    
    <!-- Utilities -->
    <script src="js/utils/Utils.js"></script>
    
    <!-- Legacy Compatibility -->
    <script src="js/index.js"></script>
</body>

</html>
