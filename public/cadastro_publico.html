<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fidelizi - Criar Conta</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link rel="icon" href="/src/assets/img/favicon.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .hidden {
            display: none !important;
        }

        .cadastro-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 3rem;
        }

        .cadastro-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .cadastro-header img {
            max-width: 200px;
            height: auto;
            margin-bottom: 1rem;
        }

        .cadastro-header h1 {
            color: #1e3a8a;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .cadastro-header p {
            color: #6b7280;
            font-size: 1rem;
        }

        .form-section {
            margin-top: 2rem;
        }

        .section-title {
            color: #1e3a8a;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .form-control,
        .form-select {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
            outline: none;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: #1e3a8a;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e40af;
        }

        .btn-login {
            background-color: #28a745;
            color: white;
        }

        .btn-login:hover {
            background-color: #218838;
        }

        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        @media (max-width: 768px) {
            .cadastro-container {
                padding: 2rem 1.5rem;
            }

            .cadastro-header h1 {
                font-size: 1.5rem;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="cadastro-container">
        <div class="cadastro-header">
            <img src="/src/assets/img/logo_horizontal.png" alt="Fidelizi">
            <h1>Criar Conta</h1>
            <p>Preencha os dados abaixo para criar sua conta</p>
        </div>

        <!-- Alert Messages -->
        <div id="alert-message" class="alert hidden"></div>

        <!-- Form Section -->
        <div class="form-section">
            <form id="user-form">
                <input type="hidden" id="user-id" value="">

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="user-type" class="form-label">Tipo de Usuário *</label>
                            <select class="form-select" id="user-type" required onchange="toggleFields()">
                                <option value="">Selecione o tipo...</option>
                                <option value="pf" selected>Pessoa Física</option>
                                <option value="pj">Pessoa Jurídica</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="user-email" class="form-label">E-mail *</label>
                            <input type="email" class="form-control" id="user-email"
                                placeholder="usuario@exemplo.com" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="user-password" class="form-label">Senha *</label>
                            <input type="password" class="form-control" id="user-password"
                                placeholder="Mínimo 6 caracteres" minlength="6" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="user-password-confirm" class="form-label">Confirmar Senha *</label>
                            <input type="password" class="form-control" id="user-password-confirm"
                                placeholder="Digite a senha novamente" minlength="6" required>
                        </div>
                    </div>
                </div>

                <!-- Campos Pessoa Física -->
                <div id="pf-fields">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="form-group">
                                <label for="user-name" class="form-label">Nome Completo *</label>
                                <input type="text" class="form-control" id="user-name"
                                    placeholder="João Silva Santos" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="user-cpf" class="form-label">CPF</label>
                                <input type="text" class="form-control" id="user-cpf"
                                    placeholder="000.000.000-00" maxlength="14">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Campos Pessoa Jurídica -->
                <div id="pj-fields" class="hidden">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="form-group">
                                <label for="company-name" class="form-label">Razão Social *</label>
                                <input type="text" class="form-control" id="company-name"
                                    placeholder="Empresa Ltda">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="company-cnpj" class="form-label">CNPJ</label>
                                <input type="text" class="form-control" id="company-cnpj"
                                    placeholder="00.000.000/0000-00" maxlength="18">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="company-contact" class="form-label">Nome do Contato</label>
                                <input type="text" class="form-control" id="company-contact"
                                    placeholder="Nome da pessoa responsável">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="company-phone" class="form-label">Telefone</label>
                                <input type="text" class="form-control" id="company-phone"
                                    placeholder="(11) 99999-9999" maxlength="15">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Criar Conta
                    </button>
                    <button type="button" class="btn btn-login" onclick="goToLogin()">
                        <i class="fas fa-sign-in-alt me-2"></i>Fazer Login
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="cancelForm()">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Configuração do Firebase -->
    <script src="js/firebase/firebase-config.js"></script>
    <script src="js/firebase/firebase-services.js"></script>
    <script src="js/auth/auth.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script de cadastro público -->
    <script src="js/cadastro_publico.js"></script>
</body>

</html>
